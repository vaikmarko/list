<!DOCTYPE html>
<html lang="et">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#c0392b">
  <meta name="robots" content="noindex, nofollow">
  <title>Külaliste parkimine · 6. korrus · Rotermann</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='20' fill='%23c0392b'/%3E%3Ctext y='.9em' font-size='70' font-family='Inter, sans-serif' font-weight='700' fill='white' x='50%' text-anchor='middle' dy='-10'%3EP%3C/text%3E%3C/svg%3E">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/park/shared.css">
</head>
<body>
  <main class="app">
    <header class="header">
      <div class="brand">Rotermann · Külaliste parkimine</div>
      <h1 class="title">6. korrus</h1>
      <p class="subtitle">Forus &amp; US Invest külalised</p>
    </header>

    <section id="view-form">
      <form id="park-form" class="form" data-floor="6" novalidate autocomplete="off">
        <div class="field">
          <label class="label" for="plate">Auto registreerimisnumber</label>
          <input
            id="plate"
            class="plate-input"
            type="text"
            inputmode="text"
            autocapitalize="characters"
            autocomplete="off"
            autocorrect="off"
            spellcheck="false"
            maxlength="10"
            placeholder="123ABC"
            aria-label="Sisesta auto registreerimisnumber"
            required
          >
          <p class="hint">Sisesta külalise auto number ilma tühikuteta.</p>
        </div>

        <div class="cta">
          <button id="submit-btn" class="btn-primary" type="submit">
            <span id="submit-spinner" class="spinner" hidden></span>
            <span id="submit-label">Pargi 3 tundi tasuta</span>
          </button>
        </div>
      </form>
    </section>

    <section id="view-result" class="result" hidden>
      <div id="result-icon" class="result-icon success">✓</div>
      <h2 id="result-title" class="result-title">Auto on pargitud!</h2>
      <div id="result-plate" class="result-plate"></div>
      <p id="result-text" class="result-text"></p>
      <div id="result-meta" class="result-meta" hidden></div>
      <div class="result-actions">
        <button id="result-action" class="btn-secondary" type="button">Pargi veel auto</button>
      </div>
    </section>

    <footer class="footer">
      Pakuvad <strong>Forus</strong> &amp; <strong>US Invest</strong>
    </footer>
  </main>

  <script src="/park/app.js" defer></script>
</body>
</html>
