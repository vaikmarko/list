    <section id="view-form">
      <form id="park-form" class="form" data-floor="6" novalidate autocomplete="off">
        <input
          id="plate"
          class="plate-input"
          type="text"
          inputmode="text"
          autocapitalize="characters"
          autocomplete="off"
          autocorrect="off"
          spellcheck="false"
          maxlength="10"
          placeholder="123ABC"
          aria-label="License plate"
          required
        >

        <div class="cta">
          <button id="submit-btn" class="btn-primary" type="submit">
            <span id="submit-spinner" class="spinner" hidden></span>
            <span id="submit-label">Park 3 hours free</span>
          </button>
        </div>
      </form>
    </section>

    <section id="view-result" class="result" hidden>
      <div id="result-icon" class="result-icon success">✓</div>
      <h2 id="result-title" class="result-title">Parked</h2>
      <div id="result-plate" class="result-plate"></div>
      <div id="result-meta" class="result-meta" hidden></div>
      <div class="result-actions">
        <button id="result-action" class="btn-secondary" type="button">Park another car</button>
      </div>
    </section>
