# Cloudflare Pages konfiguratsioon
#
# Salajased v6tmed (EUROPARK_API_KEY_5/_6) seadistame Cloudflare dashboardis
# secrets'ina. Lokaalseks arenduseks on need `.dev.vars` failis (gitignored).

name = "list"
compatibility_date = "2025-05-25"
pages_build_output_dir = "."

# Mitte-salajased keskkonnamuutujad - kehtivad nii production kui preview keskkonnas.
# Preview keskkonnas saab need dashboardis ule kirjutada (nt EUROPARK_API_BASE -> prelive).
[vars]
EUROPARK_PARTNER_ID = "4994"
EUROPARK_PRODUCT_ID_5 = "3324"
EUROPARK_PRODUCT_ID_6 = "3325"
EUROPARK_API_BASE = "https://partner.europark.ee/admin/api/v2/public"
EUROPARK_COMMENT_PREFIX_5 = "U.S. Real Estate guest"
EUROPARK_COMMENT_PREFIX_6 = "U.S. Invest guest"
PARKING_HOURS = "3"

# D1 SQLite audit log database (parkimissundmuste persistent salvestus).
# Cloudflare Pages projektile on binding seatud ka REST API kaudu
# (production + preview env) - see siin lubab lokaalset wrangler dev arendust.
[[d1_databases]]
binding = "DB"
database_name = "list-parking-log"
database_id = "bbc15fcd-6478-45b1-8322-f5df25be12d6"
